# See docs at: https://mystmd.org/guide/frontmatter
version: 1
extends:
  - https://raw.githubusercontent.com/ASFOpenSARlab/asf-myst-config/main/asf_myst.yml
project:
  title: NISAR Cookbook
  github: https://github.com/ASFOpenSARlab/NISAR_Cookbook
  authors:
    - name: The Alaska Satellite Facility
  license: BSD-3-Clause
  copyright: '2025'
  toc:
    - file: README.md
    - title: About NISAR data
    - title: Cookbook Set Up
      children:
        - file: notebooks/software_environment_docker.ipynb
        - file: notebooks/set_up_Earthdata_Login.md
    - file: notebooks/NISAR_data_access.ipynb
    - title: GCOV
      children: 
      - file: notebooks/GCOV_intro.md
      - url: https://nisar.asf.earthdatacloud.nasa.gov/NISAR-SAMPLE-DATA/DOCS/NISAR_D-102274_RevE_NASA_SDS_Product_Specification_L2_GCOV_Nov8_2024_w-sigs.pdf
        title: NISAR GCOV Product Specification
      - title: GCOV Data Access
        children:
          - file: notebooks/search_download_NISAR_GCOV_asf_search.ipynb
          - file: notebooks/search_stream_NISAR_GCOV_asf_search.ipynb
          - file: notebooks/search_NISAR_GCOV_earthaccess.ipynb
      - title: GCOV Data Loading, Manipulation, and Visualization
        children:
          - file: notebooks/Opening_HDF5_Python.ipynb
          - file: notebooks/NISAR_Pixel_Conversion.ipynb
          - file: notebooks/load_subset_reproject_isce3.ipynb
      - title: GCOV Backscatter Tutorials
        children:
          - file: notebooks/NISAR_GCOV_Time_Series_Example.ipynb
          - file: notebooks/NISAR_GCOV_SARChangeDetectionMethods.ipynb
      - title: GCOV PolSAR Tutorials
    - title: RSLC
    - title: GSLC
    - title: GUNW
    - title: Additional NISAR Resources
      children:
      - url: https://nisar-docs.asf.alaska.edu/
        title: NISAR Data User Guide
      - url: https://science.nasa.gov/mission/nisar/
        title: NISAR Mission Website
      - url: https://gitlab.com/nisar-science-algorithms
        title: NISAR Science Algorithms GitLab
      - url: https://isce-framework.github.io/isce3/
        title: ISCE3 Documentation (software backing NISAR processor)
      - url: https://search.asf.alaska.edu/
        title: ASF Data Search (Vertex)
    - title: Contribute to the NISAR Cookbook
      children:
      - file: CONTRIBUTING.md
      - file: notebooks/notebook-template.ipynb
    
